name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target.os }}-${{ matrix.target.arch }}
    # Each platform builds on its own OS runner so native packages
    # (@opentui/core-darwin-arm64, etc.) are available — cross-compiling
    # from a single linux runner doesn't work for these.
    runs-on: ${{ matrix.target.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        target:
          # darwin-x64 dropped for v0.2.0: cross-compiling from arm64 macos-14
          # can't resolve the x64 @opentui/core native binary. Add back when
          # macos-13 runners are available or @opentui/core ships a fat binary.
          - { os: darwin, arch: arm64, runs-on: macos-14 }
          - { os: linux, arch: x64, runs-on: ubuntu-latest }
          - { os: linux, arch: arm64, runs-on: ubuntu-24.04-arm }

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Build binary
        run: |
          mkdir -p dist
          bun build --compile \
            src/main.ts \
            --outfile dist/wopr-${{ matrix.target.os }}-${{ matrix.target.arch }}

      - name: Package
        run: |
          cd dist
          ARCHIVE_NAME="wopr-${{ matrix.target.os }}-${{ matrix.target.arch }}.tar.gz"
          tar -czf "$ARCHIVE_NAME" "wopr-${{ matrix.target.os }}-${{ matrix.target.arch }}"
          # macOS has shasum but not sha256sum; Linux has both. Try sha256sum
          # first, fall back to shasum for portability.
          if command -v sha256sum > /dev/null 2>&1; then
            sha256sum "$ARCHIVE_NAME" > "$ARCHIVE_NAME.sha256"
          else
            shasum -a 256 "$ARCHIVE_NAME" > "$ARCHIVE_NAME.sha256"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: wopr-${{ matrix.target.os }}-${{ matrix.target.arch }}
          path: |
            dist/wopr-${{ matrix.target.os }}-${{ matrix.target.arch }}.tar.gz
            dist/wopr-${{ matrix.target.os }}-${{ matrix.target.arch }}.tar.gz.sha256

  release:
    name: github release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            artifacts/**/wopr-*.tar.gz
            artifacts/**/wopr-*.tar.gz.sha256
