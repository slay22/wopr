name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target.os }}-${{ matrix.target.arch }}
    # Each platform builds on its own OS runner so native packages
    # (@opentui/core-darwin-arm64, etc.) are available — cross-compiling
    # from a single linux runner doesn't work for these.
    runs-on: ${{ matrix.target.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - { os: darwin, arch: arm64, runs-on: macos-14 }
          - { os: darwin, arch: x64, runs-on: macos-14 }
          - { os: linux, arch: x64, runs-on: ubuntu-latest }
          - { os: linux, arch: arm64, runs-on: ubuntu-24.04-arm }

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Build binary
        run: |
          mkdir -p dist
          # For darwin-x64 on a macos-14 (arm64) runner we cross-compile to
          # x64. @opentui/core ships native binaries for both arm64 and
          # x64 darwin so the cross-target resolves cleanly.
          if [ "${{ matrix.target.os }}" = "darwin" ] && [ "${{ matrix.target.arch }}" = "x64" ]; then
            bun build --compile \
              --target=bun-darwin-x64 \
              src/main.ts \
              --outfile dist/wopr-${{ matrix.target.os }}-${{ matrix.target.arch }}
          else
            bun build --compile \
              src/main.ts \
              --outfile dist/wopr-${{ matrix.target.os }}-${{ matrix.target.arch }}
          fi

      - name: Package
        run: |
          cd dist
          ARCHIVE_NAME="wopr-${{ matrix.target.os }}-${{ matrix.target.arch }}.tar.gz"
          tar -czf "$ARCHIVE_NAME" "wopr-${{ matrix.target.os }}-${{ matrix.target.arch }}"
          sha256sum "$ARCHIVE_NAME" > "$ARCHIVE_NAME.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: wopr-${{ matrix.target.os }}-${{ matrix.target.arch }}
          path: |
            dist/wopr-${{ matrix.target.os }}-${{ matrix.target.arch }}.tar.gz
            dist/wopr-${{ matrix.target.os }}-${{ matrix.target.arch }}.tar.gz.sha256

  release:
    name: github release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            artifacts/**/wopr-*.tar.gz
            artifacts/**/wopr-*.tar.gz.sha256
